[package]
name = "abaco"
version = "2.1.0"
description = "Math engine — expression evaluation, unit conversion, DSP math"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.10.2"

[build]
entry = "src/main.cyr"
output = "abaco"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "tagged", "hashmap", "assert", "fnptr", "bench", "args", "math", "io", "net", "http", "json", "u128"]
