name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          test "$FILE_VERSION" = "$TAG_VERSION" || { echo "VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(cat .cyrius-toolchain | tr -d '[:space:]')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          curl -sLfO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/"
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/"
          chmod +x "$HOME/.cyrius/bin/"*
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/abaco
          echo "abaco: $(wc -c < build/abaco) bytes"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/abaco
