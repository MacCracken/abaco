name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # abaco has no git deps today, so cyrius.lock isn't generated.
        # Once a git dep is added, the lockfile will appear and this
        # step will start enforcing.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::notice::no git deps — cyrius.lock not present (expected)"
          fi

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Lint (advisory)
        continue-on-error: true
        run: |
          for f in src/*.cyr programs/*.cyr tests/*.tcyr benches/*.bcyr fuzz/*.cyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f"
          done

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/abaco
          echo "abaco: $(wc -c < build/abaco) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/abaco | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/abaco-aarch64
          file build/abaco-aarch64 | grep -q "aarch64" || {
            echo "ERROR: abaco-aarch64 is not aarch64 ELF"; exit 1; }
          echo "abaco-aarch64: $(wc -c < build/abaco-aarch64) bytes"

      - name: Test
        # test_simd is quarantined: f64v_* SIMD intrinsics SIGSEGV under
        # Cyrius 5.7.23 (pre-existing compiler regression — last passed
        # on 4.8.5). Re-enable once the intrinsics are fixed upstream.
        run: |
          fail=0
          total=0
          for t in tests/test_*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            if [ "$name" = "test_simd" ]; then
              echo "::warning::skipping $name (SIMD intrinsic regression)"
              continue
            fi
            echo "::group::$name"
            out=$(cyrius test "$t" 2>&1); status=$?
            echo "$out"
            echo "::endgroup::"
            if [ $status -ne 0 ]; then
              echo "FAIL: $name"
              fail=1
            fi
            n=$(echo "$out" | grep -oE '[0-9]+ passed' | head -1 | awk '{print $1}')
            total=$((total + ${n:-0}))
          done
          echo "asserts passed: $total"
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Fuzz (smoke)
        run: |
          for f in fuzz/fuzz_*.cyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .cyr)
            echo "::group::$name"
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" 1000 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
            echo "::endgroup::"
          done

      - name: Bench (non-fatal)
        run: |
          for b in benches/*.bcyr; do
            [ -f "$b" ] || continue
            echo "::group::$b"
            cyrius bench "$b" || true
            echo "::endgroup::"
          done | tee bench-results.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abaco-${{ github.sha }}
          path: |
            build/abaco
            bench-results.txt
          if-no-files-found: warn

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          scan "raw execve"   'syscall\(\s*59'
          scan "raw fork"     'syscall\(\s*57'
          scan "sys_system"   '\bsys_system\s*\('
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md ROADMAP.md VERSION CONTRIBUTING.md \
                   SECURITY.md CODE_OF_CONDUCT.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
